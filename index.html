<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual de Usuario</title>

    <style>
        body{
            font-family: Arial;
            background-color:#f5f5f5;
            margin:0;
            padding:0;
        }

        header{
            background:#6c63ff;
            color:white;
            padding:20px;
            text-align:center;
        }

        section{
            background:white;
            margin:20px;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h2{
            color:#6c63ff;
        }

        img{
            width:100%;
            border-radius:10px;
        }
    </style>
</head>

<body>

<header>
    <h1>Manual de Usuario</h1>
    <p>Sistema Punto de Venta</p>
</header>

<section>
    <h2>Inicio de Sesión</h2>
    <p>
        Aquí el usuario puede ingresar su correo y contraseña
        para entrar al sistema.
    </p>

    <img src="https://via.placeholder.com/800x400">
</section>

<section>
    <h2>Módulo de Ventas</h2>

    <p>
        En esta parte se realizan las ventas y se agregan
        productos al carrito.
    </p>

    <img src="https://via.placeholder.com/800x400">
</section>

<section>
    <h2>Configuración</h2>

    <p>
        Aquí se configuran usuarios, negocio y tickets.
    </p>

    <img src="https://via.placeholder.com/800x400">
</section>

</body>
</html>
